name: Update Unified Subscription

on:
  push:
    branches:
      - main
      - master            # Запуск при загрузке изменений
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов
  workflow_dispatch:      # Ручной запуск

permissions:
  contents: write         # Права на запись файлов в репозиторий

jobs:
  update-sub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Merge Script
        run: python merge.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/*
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update subscriptions: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
